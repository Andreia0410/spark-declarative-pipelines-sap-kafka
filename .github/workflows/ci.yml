name: Validate & Deploy SDP Pipelines

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyspark==3.5.0 delta-spark==3.1.0 \
                      pytest flake8 black

      - name: Lint with flake8
        run: |
          flake8 pipelines/ notebooks/ \
            --max-line-length=120 \
            --exclude=__pycache__

      - name: Check formatting with black
        run: |
          black --check pipelines/ notebooks/ --line-length 120

      - name: Run unit tests
        run: pytest tests/ -v

  validate-bundle:
    name: Validate Databricks Bundle
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (dev)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_DEV_HOST }}
        run: |
          databricks bundle validate --target dev

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate-bundle
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy to Dev workspace
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_DEV_HOST }}
        run: |
          databricks bundle deploy --target dev
